name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Enforce Conventional PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate title
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|deps)(\([a-z0-9._/-]+\))?!?: .+/;

            if (pattern.test(title)) {
              core.info(`PR title is valid: ${title}`);
              return;
            }

            core.setFailed(
              [
                `PR title must follow Conventional Commits.`,
                `Received: "${title}"`,
                `Examples:`,
                `- feat(mcp): add automation workflow tools`,
                `- fix(ci): install playwright in release workflow`,
                `- chore(main): release browser-debug-mcp-bridge 1.10.0`,
              ].join('\n'),
            );
